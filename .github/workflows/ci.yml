name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: kernloom/kernloom-core
          path: kernloom-core
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: cd kernloom-core && go build -o bin/klctl ./cmd/klctl
      - run: test -f core/authoring_catalog.yaml
      - run: test -f defaults/guardrails.yaml
      - run: test -f defaults/risk_recipes.yaml
      - run: test -f defaults/profiles.yaml
      - run: ./kernloom-core/bin/klctl registry validate --core-registry .
