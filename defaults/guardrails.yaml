kind: GuardrailPack
metadata:
  id: kernloom.bootstrap.guardrails
  version: v0.1.0
spec:
  guardrails:
    - id: guardrail.no_direct_production_config_apply
      mode: block
      description: Kernloom must create proposals, not directly apply production config.
    - id: guardrail.runtime_actions_require_safety_metadata
      mode: block
      description: Runtime Actions require TTL, scope, reason, audit ID, source commit and signed bundle.
    - id: guardrail.no_self_approval
      mode: block
      description: Adapters and runtime components may not approve their own grants or scope expansion.
    - id: guardrail.unknown_is_not_success
      mode: block
      description: Unknown conformance, evidence or action state is not success.

